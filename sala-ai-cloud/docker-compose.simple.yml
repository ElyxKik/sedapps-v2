services:
  backend:
    build: ./services/backend
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend:/app
    environment:
      # Use local SQLite for development, or set Supabase credentials
      SEDAPPS_DATABASE_URL: sqlite:///./sedapps.db
      # SEDAPPS_SUPABASE_URL: https://your-project.supabase.co
      # SEDAPPS_SUPABASE_KEY: your-anon-key
      SEDAPPS_JWT_SECRET: dev-secret-change-me
      # DeepSeek LLM (optional)
      SEDAPPS_DEEPSEEK_API_KEY: ${SEDAPPS_DEEPSEEK_API_KEY:-sk-3376f9eb7d1049349cc1ba469c6aad7a}
      SEDAPPS_DEEPSEEK_BASE_URL: https://api.deepseek.com
      SEDAPPS_DEEPSEEK_MODEL: deepseek-v4-pro
      SEDAPPS_CORS_ORIGINS: '["*"]'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
