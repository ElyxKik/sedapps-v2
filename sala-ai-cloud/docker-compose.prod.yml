services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  core-api:
    build: ./services/core-api
    restart: always
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  ai-orchestrator:
    build: ./services/ai-orchestrator
    restart: always
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8001:8001"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2

  ai-worker:
    build: ./services/ai-orchestrator
    restart: always
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    command: celery -A app.celery_app.celery worker --loglevel=INFO --concurrency=2

  deploy-service:
    build: ./services/deploy-service
    restart: always
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8002:8002"]
    volumes:
      - ./apps:/workspace/apps:ro
      - ./packages:/workspace/packages:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2

  deploy-worker:
    build: ./services/deploy-service
    restart: always
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./apps:/workspace/apps:ro
      - ./packages:/workspace/packages:ro
    command: celery -A app.celery_app.celery worker --loglevel=INFO --concurrency=1 -Q celery

  inbox-service:
    build: ./services/inbox-service
    restart: always
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8003:8003"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --workers 2

  analytics-service:
    build: ./services/analytics-service
    restart: always
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8004:8004"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --workers 2

  flower:
    image: mher/flower:2.0
    restart: always
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
    ports: ["5555:5555"]
    depends_on:
      redis: { condition: service_healthy }

volumes:
  pgdata:
